name: Run Behave Automation Tests

# Triggers the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code onto the GitHub server
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up a Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install Google Chrome for headless testing
    - name: Set up Chrome browser
      uses: browser-actions/setup-chrome@v1

    # Step 4: Install your project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install behave selenium

    # Step 5: Run your Behave tests
    - name: Run Behave Tests
      run: |
        behave